name: Nightly Advantage Chairs Allure

on:
  schedule:
    - cron: '0 6 * * *' # Runs every day at 1:00 AM EST
  workflow_dispatch:

jobs:
  run-advantage-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Advantage Chairs tests
        run: npx playwright test tests/advantageChairs --reporter=line,allure-playwright
        env:
          CI: true

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Summary
        if: always()
        run: |
          echo "Allure report generated at $GITHUB_WORKSPACE/allure-report"
          echo "Download it from the Actions run artifacts section."

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn
