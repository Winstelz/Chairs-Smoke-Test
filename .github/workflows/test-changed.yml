name: Run Changed Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-changed-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to diff against previous commit

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Get changed spec files
        id: changed-files
        run: |
          echo "files=$(git diff --name-only origin/main HEAD -- '*.spec.ts' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Run changed tests
        if: steps.changed-files.outputs.files != ''
        run: npx playwright test ${{ steps.changed-files.outputs.files }}

      - name: No changed tests
        if: steps.changed-files.outputs.files == ''
        run: echo "No test files changed — skipping."